<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <!-- background -->
  <rect width="800" height="200" fill="#ffffff" rx="8"/>

  <!-- clouds -->
  <g opacity="0.15">
    <ellipse cx="600" cy="30" rx="40" ry="12" fill="#888"/>
    <ellipse cx="620" cy="26" rx="30" ry="10" fill="#888"/>
    <ellipse cx="580" cy="28" rx="25" ry="8" fill="#888"/>
  </g>

  <!-- ground line -->
  <line x1="0" y1="170" x2="800" y2="170" stroke="#535353" stroke-width="2"/>

  <!-- scrolling ground dashes -->
  <g>
    <line x1="0" y1="175" x2="840" y2="175" stroke="#535353" stroke-width="1" stroke-dasharray="8,8,2,8,4,8">
      <animateTransform attributeName="transform" type="translate" values="0,0;-40,0" dur="0.4s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- cactus 1 -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="900,0;-100,0" dur="3s" repeatCount="indefinite"/>
    <rect x="0" y="140" width="6" height="30" rx="2" fill="#535353"/>
    <rect x="-2" y="148" width="8" height="4" rx="1" fill="#535353"/>
    <rect x="2" y="145" width="8" height="4" rx="1" fill="#535353"/>
  </g>

  <!-- cactus 2 -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="900,0;-100,0" dur="3s" repeatCount="indefinite" begin="1.5s"/>
    <rect x="0" y="145" width="6" height="25" rx="2" fill="#535353"/>
    <rect x="-4" y="155" width="8" height="4" rx="1" fill="#535353"/>
    <rect x="-2" y="152" width="4" height="4" rx="1" fill="#535353"/>
  </g>

  <!-- T-Rex Dino body group with bobbing -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-2;0,0" dur="0.3s" repeatCount="indefinite"/>

    <!-- tail -->
    <path d="M 78,148 L 50,140 L 55,150 L 78,155 Z" fill="#535353"/>
    <!-- body -->
    <ellipse cx="100" cy="145" rx="22" ry="14" fill="#535353"/>
    <!-- head -->
    <ellipse cx="130" cy="130" rx="16" ry="12" fill="#535353"/>
    <!-- snout -->
    <path d="M 140,122 Q 155,125 150,135 L 140,135 Z" fill="#535353"/>
    <!-- eye -->
    <circle cx="135" cy="127" r="3" fill="#ffffff"/>
    <circle cx="136" cy="126" r="1.5" fill="#535353"/>
    <!-- crest -->
    <path d="M 118,120 L 122,108 L 128,118 Z" fill="#535353"/>
    <!-- arm -->
    <rect x="115" y="140" width="4" height="10" rx="2" fill="#535353" transform="rotate(-20,117,140)"/>

    <!-- back leg -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="-15,95,155;20,95,155;-15,95,155" dur="0.3s" repeatCount="indefinite"/>
      <rect x="90" y="155" width="6" height="18" rx="2" fill="#535353"/>
      <rect x="86" y="171" width="12" height="4" rx="2" fill="#535353"/>
    </g>

    <!-- front leg -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="20,115,155;-15,115,155;20,115,155" dur="0.3s" repeatCount="indefinite"/>
      <rect x="110" y="155" width="6" height="18" rx="2" fill="#535353"/>
      <rect x="106" y="171" width="12" height="4" rx="2" fill="#535353"/>
    </g>
  </g>

  <!-- score text -->
  <text x="700" y="30" font-family="Courier New, monospace" font-size="14" fill="#535353" text-anchor="end">HI 00000 0000</text>
</svg>
