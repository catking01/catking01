name: Recent Blog

on:
  # schedule disabled — blog section replaced with manual content
  # schedule:
  #   - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-readme-feed
    steps:
      - uses: actions/checkout@v4
      - uses: sarisia/actions-readme-feed@v1
        with:
          url: "https://blog.catking01.dev/rss.xml"
          file: "README.md"
      - uses: sarisia/actions-commit@master
