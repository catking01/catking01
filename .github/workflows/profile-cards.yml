name: Profile Cards

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Serialize with itself so a manual run can't race a delayed scheduled run.
concurrency:
  group: profile-readme-commits
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      # Only overwrite the committed streak cards when the download is a real,
      # healthy streak card. streak-stats.demolab.com returns HTTP 200 with a
      # valid <svg> even for errors (rate limit, outage, unknown user), so we
      # also require the "Total Contributions" label that only healthy cards have.
      - name: Fetch streak cards
        run: |
          fetch_svg() {
            url="$1"; dest="$2"; tmp="$(mktemp)"
            if curl -fsSL --max-time 120 "$url" -o "$tmp" \
               && grep -q '<svg' "$tmp" \
               && grep -q 'Total Contributions' "$tmp"; then
              mv "$tmp" "$dest"
              echo "Updated $dest"
            else
              rm -f "$tmp"
              echo "::warning::Streak fetch failed or returned a non-card SVG for $dest; keeping existing file"
            fi
          }
          fetch_svg 'https://streak-stats.demolab.com/?user=catking01&theme=default&hide_border=true&disable_animations=true&date_format=Y-m-d' github-metrics/streak.svg
          fetch_svg 'https://streak-stats.demolab.com/?user=catking01&theme=dark&hide_border=true&disable_animations=true&date_format=Y-m-d' github-metrics/streak.dark.svg

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # A language-card failure must not discard a successful streak refresh, so
      # keep the job green and surface the problem as a warning instead.
      - name: Generate language cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/generate_language_card.py \
            || echo "::warning::language card generation failed; keeping existing cards"

      # Commit with rebase-and-retry so an overlapping metrics.yml push (GitHub
      # cron jitter can nullify the 30-minute stagger) doesn't fail the run.
      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-metrics/streak.svg github-metrics/streak.dark.svg \
                  github-metrics/languages.svg github-metrics/languages.dark.svg
          if git diff --cached --quiet; then
            echo "No card changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh profile cards [skip ci]"
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected; rebasing onto latest (attempt $attempt)"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          done
          git push
