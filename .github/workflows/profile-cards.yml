name: Profile Cards

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Serialize with itself (and with metrics.yml, which shares this group) so
# commits to the default branch can't race each other.
concurrency:
  group: profile-readme-commits
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      # Fetch both streak themes to temp files and only swap them in together, so
      # a partial failure can't commit a mismatched light/dark pair. Each card
      # must be a real, healthy streak SVG: streak-stats.demolab.com returns
      # HTTP 200 with a valid <svg> even for errors, so we also require the
      # "Total Contributions" label, cap the size, and reject any <script>.
      - name: Fetch streak cards
        run: |
          fetch_svg() {
            url="$1"; out="$2"
            curl -fsSL --max-time 120 --max-filesize 262144 \
                 --retry 3 --retry-all-errors --retry-delay 5 "$url" -o "$out" \
              && grep -q '<svg' "$out" \
              && grep -q 'Total Contributions' "$out" \
              && ! grep -qi '<script' "$out"
          }
          light="$(mktemp)"; dark="$(mktemp)"
          if fetch_svg 'https://streak-stats.demolab.com/?user=catking01&theme=default&hide_border=true&disable_animations=true&date_format=Y-m-d' "$light" \
             && fetch_svg 'https://streak-stats.demolab.com/?user=catking01&theme=dark&hide_border=true&disable_animations=true&date_format=Y-m-d' "$dark"; then
            mv "$light" github-metrics/streak.svg
            mv "$dark" github-metrics/streak.dark.svg
            echo "Updated streak cards"
          else
            rm -f "$light" "$dark"
            echo "::warning::Streak fetch failed or returned a non-card SVG; keeping existing streak cards"
          fi

      # continue-on-error so neither a Python-setup hiccup nor a language-data
      # failure can discard the streak refresh; the failure is still flagged.
      - name: Set up Python
        id: setup_python
        continue-on-error: true
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate language cards
        id: gen
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_language_card.py

      # Commit with rebase-and-retry so an overlapping push (GitHub cron jitter
      # can nullify the stagger) doesn't fail the run.
      - name: Commit updated cards
        env:
          GEN_OUTCOME: ${{ steps.gen.outcome }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # If language generation didn't succeed, discard any partial card
          # changes so a stale/mismatched pair is never committed; the streak
          # refresh still lands.
          if [ "$GEN_OUTCOME" != "success" ]; then
            echo "::warning::language card generation did not succeed; keeping existing language cards"
            git checkout -- github-metrics/languages.svg github-metrics/languages.dark.svg 2>/dev/null || true
          fi
          git add github-metrics/streak.svg github-metrics/streak.dark.svg \
                  github-metrics/languages.svg github-metrics/languages.dark.svg
          if git diff --cached --quiet; then
            echo "No card changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh profile cards [skip ci]"
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected; rebasing onto latest (attempt $attempt)"
            git pull --rebase --autostash origin "refs/heads/${GITHUB_REF_NAME}"
          done
          git push
